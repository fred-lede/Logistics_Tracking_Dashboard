appId: com.logistics.dashboard
productName: Logistics Dashboard
copyright: Copyright © 2026

directories:
  output: release
  buildResources: assets

asar: false

afterPack: scripts/after-pack.cjs

files:
  - electron/**/*
  - .next/standalone/**/*
  - prisma/**/*
  - assets/**/*
  - package.json
  - "!.next/standalone/release/**"
  - "!.next/standalone/docs/**"
  - "!.next/standalone/src/**"
  - "!.next/standalone/scripts/**"
  - "!.next/standalone/.env*"
  - "!.next/standalone/.carrier-creds.json"
  - "!.next/standalone/dev.db*"
  - "!node_modules/**"
  - "!**/*.map"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/benchmark/**"
  - "!**/benchmarks/**"
  - "!docs/**"
  - "!AGENTS.md"
  - "!TASK.md"
  - "!README.md"
  - "!.env*"
  - "!.carrier-creds.json"
  - "!*.tsbuildinfo"
  - "!scripts/**"
  - "!src/**"

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null

win:
  target:
    - "nsis:x64"
    - "portable:x64"
  icon: assets/icon.ico

linux:
  target:
    - "AppImage:x64"
    - "deb:x64"
  icon: assets/icon.png
  category: Office
  maintainer: fred.yt.wang@outlook.com
